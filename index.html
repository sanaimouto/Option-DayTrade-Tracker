<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>選擇權當沖當日交易紀錄器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            padding: 30px 15px;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            background-color: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 950px;
            box-sizing: border-box;
        }
        h2 {
            color: #2c3e50;
            margin-top: 0;
            border-left: 5px solid #3498db;
            padding-left: 10px;
            font-size: 18px;
        }
        .flex-inputs {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 15px;
            background-color: #f8fafc;
            padding: 15px;
            border-radius: 6px;
        }
        .form-group {
            flex: 1;
            min-width: 140px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            font-size: 13px;
            color: #555;
        }
        input[type="number"], select {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .btn-main {
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            font-weight: bold;
            height: 38px;
            align-self: flex-end;
            margin-bottom: 1px;
        }
        .btn-main:hover { background-color: #27ae60; }
        
        /* 歷史表格樣式 */
        .table-container {
            width: 100%;
            overflow-x: auto;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            text-align: center;
        }
        th, td {
            padding: 10px;
            border-bottom: 1px solid #e2e8f0;
        }
        th {
            background-color: #edf2f7;
            color: #4a5568;
            font-weight: bold;
        }
        tr:hover { background-color: #f8fafc; }
        
        /* 狀態與損益顏色（台灣習慣：紅賺綠賠） */
        .profit { color: #e74c3c; font-weight: bold; }
        .loss { color: #2ecc71; font-weight: bold; }
        .neutral { color: #7f8c8d; }
        
        .status-open { background-color: #ffeebc; color: #b7791f; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .status-closed { background-color: #edf2f7; color: #4a5568; padding: 2px 6px; border-radius: 4px; font-size: 12px; }
        
        .btn-sm {
            padding: 4px 8px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-close { background-color: #3498db; color: white; }
        .btn-close:hover { background-color: #2980b9; }
        .btn-delete { background-color: #e74c3c; color: white; }
        .btn-delete:hover { background-color: #c0392b; }
        
        .clear-all-box {
            text-align: right;
            margin-top: 15px;
        }
        .btn-clear-all {
            background-color: #95a5a6;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-clear-all:hover { background-color: #7f8c8d; }
    </style>
</head>
<body>

<div class="container">
    <h2>1. 當前盤中建倉輸入</h2>
    <div class="flex-inputs">
        <div class="form-group">
            <label>交易方向</label>
            <select id="tradeType">
                <option value="CALL">買進買權 (Buy CALL)</option>
                <option value="PUT">買進賣權 (Buy PUT)</option>
            </select>
        </div>
        <div class="form-group">
            <label>進場台指點數</label>
            <input type="number" id="indexPoint" placeholder="例如: 22050">
        </div>
        <div class="form-group">
            <label>買進權利金 (點)</label>
            <input type="number" id="entryPrice" placeholder="例如: 80" step="0.5">
        </div>
        <div class="form-group">
            <label>交易口數</label>
            <input type="number" id="quantity" value="1" min="1">
        </div>
        <button class="btn-main" onclick="createPosition()">確認建倉 (存入瀏覽器)</button>
    </div>

    <h2>2. 當日交易歷史與盤中部位</h2>
    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>建立時間</th>
                    <th>商品</th>
                    <th>進場台指</th>
                    <th>買進點數</th>
                    <th>口數</th>
                    <th>平倉點數</th>
                    <th>點數損益</th>
                    <th>真實損益 (NTD)</th>
                    <th>狀態</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="historyBody">
                </tbody>
        </table>
    </div>
    
    <div class="clear-all-box">
        <button class="btn-clear-all" onclick="clearAllHistory()">清除全部歷史紀錄</button>
    </div>
</div>

<script>
    // 頁面載入時，自動從瀏覽器快取 (localStorage) 讀取歷史資料
    let tradeHistory = JSON.parse(localStorage.getItem('my_option_trades')) || [];

    // 初始化渲染表格
    renderTable();

    // 點擊「確認建倉」執行的功能
    function createPosition() {
        const type = document.getElementById('tradeType').value;
        const indexPoint = document.getElementById('indexPoint').value;
        const entryPrice = parseFloat(document.getElementById('entryPrice').value);
        const quantity = parseInt(document.getElementById('quantity').value);

        if (isNaN(entryPrice) || isNaN(quantity) || entryPrice <= 0) {
            alert("請填入正確的買進權利金與口數！");
            return;
        }

        // 建立一筆新的交易物件 (預設狀態為 'open' 未平倉)
        const now = new Date();
        const timeStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        
        const newTrade = {
            id: Date.now(), // 用時間戳記當唯一ID
            date: timeStr,
            type: type,
            indexPoint: indexPoint ? parseInt(indexPoint) : '-',
            entryPrice: entryPrice,
            quantity: quantity,
            exitPrice: null,
            pnlPoints: null,
            pnlNTD: null,
            status: 'open'
        };

        // 塞入歷史陣列的最前端（最新的顯示在最上面）
        tradeHistory.unshift(newTrade);
        
        // 儲存並更新畫面
        saveAndRender();

        // 清空表單的部分輸入框，方便下一筆輸入
        document.getElementById('indexPoint').value = '';
        document.getElementById('entryPrice').value = '';
    }

    // 盤中或尾盤點擊「平倉」執行的功能
    function closePosition(id) {
        const exitInput = document.getElementById(`exit_${id}`);
        const exitPrice = parseFloat(exitInput.value);

        if (isNaN(exitPrice) || exitPrice < 0) {
            alert("請輸入正確的平倉權利金點數！");
            return;
        }

        // 尋找對應的交易紀錄
        const trade = tradeHistory.find(t => t.id === id);
        if (trade) {
            trade.exitPrice = exitPrice;
            trade.pnlPoints = exitPrice - trade.entryPrice; // 買方損益邏輯：平倉點 - 進場點
            trade.pnlNTD = trade.pnlPoints * 50 * trade.quantity; // 選擇權 1點 = 50元
            trade.status = 'closed';
            
            saveAndRender();
        }
    }

    // 刪除單筆紀錄
    function deletePosition(id) {
        if(confirm("確定要刪除這筆紀錄嗎？")) {
            tradeHistory = tradeHistory.filter(t => t.id !== id);
            saveAndRender();
        }
    }

    // 清除全部紀錄
    function clearAllHistory() {
        if(confirm("警告：這將會永久刪除瀏覽器中所有的歷史交易紀錄，確定清除？")) {
            tradeHistory = [];
            saveAndRender();
        }
    }

    // 核心：將資料寫入硬碟快取並渲染畫面
    function saveAndRender() {
        localStorage.setItem('my_option_trades', JSON.stringify(tradeHistory));
        renderTable();
    }

    // 將資料轉化為表格 HTML 呈現
    function renderTable() {
        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = '';

        if (tradeHistory.length === 0) {
            tbody.innerHTML = `<tr><td colspan="10" class="neutral" style="padding:30px;">目前尚無交易紀錄，請於上方輸入建倉。</td></tr>`;
            return;
        }

        tradeHistory.forEach(trade => {
            const tr = document.createElement('tr');
            
            let exitCell = '';
            let pnlPointsCell = '-';
            let pnlNtdCell = '-';
            let statusCell = '';
            let actionCell = '';

            // 根據未平倉/已平倉 決定畫面的外觀
            if (trade.status === 'open') {
                statusCell = `<span class="status-open">未平倉</span>`;
                exitCell = `<input type="number" id="exit_${trade.id}" placeholder="平倉點" step="0.5" style="width:80px; padding:4px;">`;
                actionCell = `<button class="btn-sm btn-close" onclick="closePosition(${trade.id})">確認平倉</button>`;
            } else {
                statusCell = `<span class="status-closed">已平倉</span>`;
                exitCell = trade.exitPrice;
                
                // 計算正負號與上色格式
                const prefix = trade.pnlNTD > 0 ? '+' : '';
                const colorClass = trade.pnlNTD > 0 ? 'profit' : (trade.pnlNTD < 0 ? 'loss' : 'neutral');
                
                pnlPointsCell = `<span class="${colorClass}">${prefix}${trade.pnlPoints.toFixed(1)}</span>`;
                pnlNtdCell = `<span class="${colorClass}">${prefix}${trade.pnlNTD.toLocaleString()} 元</span>`;
                actionCell = `<button class="btn-sm btn-delete" onclick="deletePosition(${trade.id})">刪除</button>`;
            }

            tr.innerHTML = `
                <td>${trade.date}</td>
                <td style="font-weight:bold;">${trade.type}</td>
                <td>${trade.indexPoint}</td>
                <td>${trade.entryPrice}</td>
                <td>${trade.quantity}</td>
                <td>${exitCell}</td>
                <td>${pnlPointsCell}</td>
                <td>${pnlNtdCell}</td>
                <td>${statusCell}</td>
                <td>${actionCell}</td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>

</body>
</html>
